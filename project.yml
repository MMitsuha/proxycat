# XcodeGen spec. Run `make project` after dropping Libmihomo.xcframework
# into Frameworks/. Install xcodegen via `brew install xcodegen`.
#
# Versioning is automatic: scripts/generate-project.sh exports
# PROXYCAT_MARKETING_VERSION (from ./VERSION) and PROXYCAT_BUILD_NUMBER
# (from `git rev-list --count HEAD`). Run `make version` to preview the
# values that the next `make project` will bake into the project.

name: ProxyCat
options:
  bundleIdPrefix: io.proxycat
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "JV3QRB73G3" # fill with your Apple Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: "1,2"
    APP_GROUP_ID: group.io.proxycat
    OTHER_LDFLAGS: "$(inherited)"
    # Frameworks built with GENERATE_INFOPLIST_FILE=YES still need these
    # at the project level — without MARKETING_VERSION the auto-plist
    # omits CFBundleShortVersionString and App Store validation rejects
    # the archive. Empty values mean someone ran xcodegen without going
    # through scripts/generate-project.sh; the build will then fail loudly
    # at archive time, which is the desired behavior.
    MARKETING_VERSION: ${PROXYCAT_MARKETING_VERSION}
    CURRENT_PROJECT_VERSION: ${PROXYCAT_BUILD_NUMBER}

packages: {}

targets:
  Library:
    type: framework
    platform: iOS
    sources:
      - path: Library
      # Folder reference (preserves directory structure inside the
      # framework bundle). Drop geoip.dat / geosite.dat / *.mmdb under
      # BundledAssets/geo/ and an external-ui directory at
      # BundledAssets/ui/ to embed them at compile time. They'll be
      # copied to the App Group working directory on first run and
      # are excluded from the Settings → Clear Cache action.
      - path: BundledAssets
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - framework: Frameworks/Libmihomo.xcframework
        embed: false
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Library
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        GENERATE_INFOPLIST_FILE: YES
        # XcodeGen's framework preset hardcodes CURRENT_PROJECT_VERSION: 1,
        # overriding the project-level base. Re-assert here so embedded
        # framework bundles match the app's build number.
        CURRENT_PROJECT_VERSION: ${PROXYCAT_BUILD_NUMBER}
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"

  ApplicationLibrary:
    type: framework
    platform: iOS
    sources:
      - path: ApplicationLibrary
      - path: Localizable.xcstrings
    dependencies:
      - target: Library
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.ApplicationLibrary
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: ${PROXYCAT_BUILD_NUMBER}

  Pcat:
    type: application
    platform: iOS
    sources:
      - path: Pcat
      - path: Localizable.xcstrings
    dependencies:
      - target: Library
        embed: true
      - target: ApplicationLibrary
        embed: true
      - target: PcatExtension
        embed: true
        codeSign: true
      - framework: Frameworks/Libmihomo.xcframework
        embed: true
        codeSign: true
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Pcat
        # The static plist holds only what can't be expressed via
        # INFOPLIST_KEY_* (the YAML profile UTI). Xcode merges
        # INFOPLIST_KEY_* into the generated plist and then merges
        # INFOPLIST_FILE on top, so both sources end up in the bundle.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Pcat/Info.plist
        CODE_SIGN_ENTITLEMENTS: Pcat/Pcat.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_PREVIEWS: YES
        # Target → General fields: Display Name + Category live here so
        # they're discoverable from the GUI and centralized in this file.
        INFOPLIST_KEY_CFBundleDisplayName: ProxyCat
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # Skip the App Store export-compliance prompt (no custom crypto).
        # Must be the INFOPLIST_KEY_ prefixed variant — the plain
        # ITSAppUsesNonExemptEncryption build setting doesn't reach the
        # bundled plist.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # UIApplicationSceneManifest stays in the static plist. The
        # INFOPLIST_KEY_UIApplicationSceneManifest_Generation autogen
        # forces UIApplicationSupportsMultipleScenes=YES regardless of
        # the separate setting, which is wrong for this app.

  PcatExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PcatExtension
    dependencies:
      - target: Library
        embed: false
      - framework: Frameworks/Libmihomo.xcframework
        embed: false
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Pcat.PcatExtension
        # The static plist carries the NSExtension dict (no INFOPLIST_KEY_
        # equivalent); display name and version flow through build settings.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: PcatExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: PcatExtension/PcatExtension.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: "ProxyCat Tunnel"

  LibraryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LibraryTests
    dependencies:
      - target: Library
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.LibraryTests
        GENERATE_INFOPLIST_FILE: YES
        # Tests run on a simulator; the App Group entitlement is not
        # available unsigned, so we point FilePath at a per-process
        # fallback (Documents). Tests don't exercise IPC anyway.
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
