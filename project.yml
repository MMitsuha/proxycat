# XcodeGen spec. ProxyCat.xcodeproj is generated and intentionally ignored.
# Use `make project` or any build target in the Makefile instead of running
# xcodegen directly so these environment-backed values are always populated:
#
#   PROXYCAT_MARKETING_VERSION  from VERSION, unless overridden
#   PROXYCAT_BUILD_NUMBER       from git rev-list --count HEAD, unless overridden
#   XCODE_DEVELOPMENT_TEAM      optional Apple Team ID for device signing

name: ProxyCat
options:
  bundleIdPrefix: io.proxycat
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    APP_GROUP_ID: group.io.proxycat
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: ${PROXYCAT_BUILD_NUMBER}
    DEVELOPMENT_TEAM: ${XCODE_DEVELOPMENT_TEAM}
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: ${PROXYCAT_MARKETING_VERSION}
    OTHER_LDFLAGS: "$(inherited)"
    SUPPORTS_MACCATALYST: NO
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Library:
    type: framework
    platform: iOS
    sources:
      - path: Library
      # Preserve the asset directory structure inside Library.framework.
      # `BundledAssets.installIfNeeded()` copies these embedded files into
      # the App Group working directory before mihomo starts.
      - path: BundledAssets
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - framework: Frameworks/Libmihomo.xcframework
        embed: false
      - sdk: libresolv.tbd
    scheme:
      testTargets:
        - LibraryTests
    settings:
      base:
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        CURRENT_PROJECT_VERSION: ${PROXYCAT_BUILD_NUMBER}
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        GENERATE_INFOPLIST_FILE: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Library
        SKIP_INSTALL: YES

  ApplicationLibrary:
    type: framework
    platform: iOS
    sources:
      - path: ApplicationLibrary
      - path: Localizable.xcstrings
    dependencies:
      - target: Library
        embed: false
    settings:
      base:
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        CURRENT_PROJECT_VERSION: ${PROXYCAT_BUILD_NUMBER}
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.ApplicationLibrary
        SKIP_INSTALL: YES

  Pcat:
    type: application
    platform: iOS
    sources:
      - path: Pcat
      - path: Localizable.xcstrings
      - path: AppIcon.icon
    dependencies:
      - target: Library
        embed: true
      - target: ApplicationLibrary
        embed: true
      - target: PcatExtension
        embed: true
        codeSign: true
      - framework: Frameworks/Libmihomo.xcframework
        embed: true
        codeSign: true
      - sdk: libresolv.tbd
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Pcat/Pcat.entitlements
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Pcat/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: ProxyCat
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Pcat
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        # Keep UIApplicationSceneManifest in Pcat/Info.plist. Xcode's
        # generated scene-manifest setting forces multiple scenes on.

  PcatExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PcatExtension
    dependencies:
      - target: Library
        embed: false
      - framework: Frameworks/Libmihomo.xcframework
        embed: false
      - sdk: libresolv.tbd
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: PcatExtension/PcatExtension.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: PcatExtension/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "ProxyCat Tunnel"
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Pcat.PcatExtension
        # PacketTunnelProvider overrides NEPacketTunnelProvider APIs whose
        # iOS 26 SDK annotations conflict with complete Swift 6 concurrency.
        # Keep strict checking on the shared libraries and limit this shim to
        # Swift 5 mode until the SDK boundary is cleanly expressible.
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_VERSION: "5"

  LibraryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LibraryTests
    dependencies:
      - target: Library
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.LibraryTests
