# XcodeGen spec. Run `xcodegen generate` after dropping Libmihomo.xcframework
# into Frameworks/. Install xcodegen via `brew install xcodegen`.

name: ProxyCat
options:
  bundleIdPrefix: io.proxycat
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "JV3QRB73G3" # fill with your Apple Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: "1,2"
    APP_GROUP_ID: group.io.proxycat
    OTHER_LDFLAGS: "$(inherited)"
    # Frameworks generated with GENERATE_INFOPLIST_FILE=YES need these
    # explicitly — without MARKETING_VERSION the auto-plist omits
    # CFBundleShortVersionString and App Store validation rejects the
    # archive. Keep in sync with Pcat/Info.plist (the host app uses a
    # static plist).
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages: {}

targets:
  Library:
    type: framework
    platform: iOS
    sources:
      - path: Library
      # Folder reference (preserves directory structure inside the
      # framework bundle). Drop geoip.dat / geosite.dat / *.mmdb under
      # BundledAssets/geo/ and an external-ui directory at
      # BundledAssets/ui/ to embed them at compile time. They'll be
      # copied to the App Group working directory on first run and
      # are excluded from the Settings → Clear Cache action.
      - path: BundledAssets
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - framework: Frameworks/Libmihomo.xcframework
        embed: false
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Library
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        GENERATE_INFOPLIST_FILE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"

  ApplicationLibrary:
    type: framework
    platform: iOS
    sources:
      - path: ApplicationLibrary
      - path: Localizable.xcstrings
    dependencies:
      - target: Library
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.ApplicationLibrary
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  Pcat:
    type: application
    platform: iOS
    sources:
      - path: Pcat
      - path: Localizable.xcstrings
    dependencies:
      - target: Library
        embed: true
      - target: ApplicationLibrary
        embed: true
      - target: PcatExtension
        embed: true
        codeSign: true
      - framework: Frameworks/Libmihomo.xcframework
        embed: true
        codeSign: true
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Pcat
        INFOPLIST_FILE: Pcat/Info.plist
        CODE_SIGN_ENTITLEMENTS: Pcat/Pcat.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_PREVIEWS: YES

  PcatExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PcatExtension
    dependencies:
      - target: Library
        embed: false
      - framework: Frameworks/Libmihomo.xcframework
        embed: false
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.proxycat.Pcat.PcatExtension
        INFOPLIST_FILE: PcatExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: PcatExtension/PcatExtension.entitlements
