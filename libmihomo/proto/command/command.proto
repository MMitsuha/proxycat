syntax = "proto3";

package proxycat.command;

option go_package = "github.com/proxycat/libmihomo/proto/command;command";

// Command service exposes streaming subscriptions and unary command RPCs
// used by the iOS host app. Mirrors the shape of sing-box's
// daemon.StartedService (gRPC over Unix domain socket inside the App
// Group container) but trimmed to the fields ProxyCat actually needs.
// Host-facing control traffic stays on this gRPC channel; when the
// native UI needs mihomo's REST handlers, the extension proxies the
// request internally to mihomo's private Unix-domain controller socket.
//
// Logs are unfiltered: mihomo's observable broadcasts every event
// regardless of the runtime log filter (which only gates stdout in
// mihomo's logrus shim — useless on iOS where stdout goes nowhere).
// Filtering is therefore a pure host concern; the Logs tab applies
// `selectedLevel` locally and there is no SetLogLevel RPC.
service Command {
  // Streams a Status message every IntervalMs (default 1000).
  rpc SubscribeStatus(StatusRequest) returns (stream StatusMessage);

  // Streams every log event produced by mihomo from subscription onward.
  // The host is expected to keep this stream open ONLY while the Logs
  // tab is visible and the app is active — see command_server.go for
  // the bounded-buffer drain that protects mihomo's global logger from
  // a backgrounded host that stops reading.
  rpc SubscribeLogs(LogRequest) returns (stream LogMessage);

  // Asks the running mihomo core to re-read runtime_settings.json + the
  // active profile YAML, then hot-apply via hub.ApplyConfig. Used by the
  // host whenever the user changes the active profile, edits the active
  // YAML, or toggles a runtime setting that requires a full rebuild
  // (e.g. external controller). Errors (mihomo not started, YAML parse
  // failure, semantic config rejection) flow back via gRPC status.
  rpc Reload(ReloadRequest) returns (ReloadResponse);

  // Proxies a single native-controller HTTP request through the command
  // IPC channel. The extension side executes the request with Go's
  // net/http client over mihomo's private Unix-domain controller socket.
  // This keeps host ↔ extension IPC on one gRPC transport while still
  // reusing mihomo's existing REST handlers for /proxies, /connections,
  // /group/.../delay, etc.
  rpc ControllerRequest(ControllerRequestRequest) returns (ControllerRequestResponse);
}

message StatusRequest {
  // 0 → server default (1 s). Clamped to [100ms, 10s].
  int64 interval_ms = 1;
}

message StatusMessage {
  // Bytes/sec for the current second.
  int64 up = 1;
  int64 down = 2;
  // Cumulative since the extension started.
  int64 up_total = 3;
  int64 down_total = 4;
  // Currently tracked connections.
  int64 connections = 5;
  // Extension process phys_footprint (bytes) — same number jetsam compares.
  int64 memory_resident = 6;
  // Per-process budget set at Start (resident + os_proc_available_memory).
  int64 memory_budget = 7;
}

message LogRequest {}

message LogMessage {
  // Mihomo log level: 0=DEBUG 1=INFO 2=WARNING 3=ERROR. SILENT (=4) is
  // a host-side display filter and never appears on the wire.
  int32 level = 1;
  string payload = 2;
  // Unix nanoseconds captured the moment mihomo emitted the event.
  // The host uses this directly so the timestamp shown in the live UI
  // matches the one written to the on-disk session log, even when the
  // gRPC frame is delayed by a backpressure cycle.
  int64 timestamp_ns = 3;
}

message ReloadRequest {}

message ReloadResponse {}

message ControllerRequestRequest {
  string method = 1;
  // Absolute path plus optional query string, e.g. "/proxies" or
  // "/group/JP%2FTokyo/delay?timeout=5000". The caller is responsible
  // for percent-encoding path segments.
  string path = 2;
  string content_type = 3;
  bytes body = 4;
}

message ControllerRequestResponse {
  int32 status = 1;
  bytes body = 2;
}
